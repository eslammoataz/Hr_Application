version: '3.8'

services:
  database:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "Password2024"
      POSTGRES_USER: "admin"
      POSTGRES_DB: "HrSystemApp"
    ports:
      - "5444:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d HrSystemApp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev: